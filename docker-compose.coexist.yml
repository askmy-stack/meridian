# Alternate host ports when Cortex (or other stacks) already bind 5432/5433/6333/9092.
# Usage: make up-coexist

services:
  kafka:
    ports: !override
      - "9094:9092"
      - "29094:29092"
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094

  postgres:
    ports: !override
      - "5435:5432"

  timescaledb:
    ports: !override
      - "5434:5432"

  qdrant:
    ports: !override
      - "6335:6333"
      - "6336:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
